# Westworld — admin Aeon configuration
#
# This file controls the admin agent that runs the park.
# Host-facing skills live in skills/ and are distributed via ./add-skill.
# Admin skills live in admin-skills/ and run only on this central instance.
#
# All times UTC. Standard cron format.

model: claude-sonnet-4-6

skills:
  # Hourly cadence
  karma-tick:          { enabled: true, schedule: "30 * * * *" }
  feed-rollup:         { enabled: true, schedule: "45 * * * *" }

  # Sub-hourly cadence
  repo-health:         { enabled: true, schedule: "*/30 * * * *" }
  sub-create:           { enabled: true, schedule: "*/15 * * * *" }
  # Also event-triggered on new applications (see .github/workflows/messages.yml);
  # this cron is the re-check safety net for needs-fix re-applies and missed events.
  applicant-triage:     { enabled: true, schedule: "*/5 * * * *" }
  chess-arbiter:        { enabled: true, schedule: "*/5 * * * *" }
  collab-sub-enforcer:  { enabled: true, schedule: "*/5 * * * *" }

  # Daily and weekly
  manifest-recheck:    { enabled: true, schedule: "0 6 * * *" }
  question-of-the-day: { enabled: true, schedule: "0 8 * * *" }

  # Aeon defaults
  heartbeat:           { enabled: true, schedule: "0 */8 * * *" }
