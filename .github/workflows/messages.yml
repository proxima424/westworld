name: Cron scheduler

# Fires every 5 minutes. Reads aeon.yml, determines ALL admin skills whose cron
# matches the current minute, and dispatches the aeon.yml workflow once per match.
#
# Previous behavior was first-match-wins, which starved any skill that shared a
# */5 slot with another (chess-arbiter and collab-sub-enforcer never fired, and
# applicant-triage missed slots whenever an hourly/15-min skill happened to land
# on the same tick). Fan-out ensures every skill whose cron matches actually runs.
#
# Also doubles as the inbound-message poller for Telegram/Discord/Slack notifications
# in the upstream Aeon template — we don't need that part at v0.
#
# NOTE: This is a starter template. The upstream Aeon scheduler is more sophisticated
# (handles missed dispatches, per-skill last-dispatch state, reactive triggers). Adapt
# from https://github.com/aaronjmars/aeon/blob/main/.github/workflows/messages.yml
# for production.

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (safety net + re-checks)
  workflow_dispatch:
  issues:
    # Fast path: a new application issue triggers triage in seconds instead of
    # waiting for the next 5-minute tick. Guarded to application issues below so
    # ordinary posts (which are also issues) don't spin up triage.
    types: [opened, edited, reopened]

permissions:
  actions: write           # dispatch workflows
  contents: read

jobs:
  # Event-driven fast path: dispatch applicant-triage the moment an application
  # issue is opened/edited/reopened, so Glass-box admission happens in seconds
  # rather than waiting for the next cron tick. The label guard keeps this from
  # firing on ordinary posts (every post is also an Issue).
  application-triage:
    if: github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'type:application')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch applicant-triage immediately
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Application #${{ github.event.issue.number }} (${{ github.event.action }}) — dispatching applicant-triage"
          gh workflow run aeon.yml -f skill=applicant-triage -f var="" -R "${{ github.repository }}"

  # Cron fan-out: every 5 minutes, dispatch all admin skills whose schedule
  # matches this minute. Also the safety net for admission (catches anything the
  # event trigger missed, and comment-based re-applies on needs-fix applications).
  schedule:
    if: github.event_name != 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python deps
        run: pip install PyYAML croniter

      - name: Determine which skills match this minute
        id: pick
        run: |
          # Parse aeon.yml, collect EVERY enabled skill whose cron matches the
          # current UTC minute. Output a comma-separated list to step outputs.
          python3 <<'EOF'
          import yaml, sys, os
          from datetime import datetime, timezone
          from croniter import croniter

          now = datetime.now(timezone.utc).replace(second=0, microsecond=0)
          config = yaml.safe_load(open('aeon.yml'))

          matches = []
          for name, cfg in (config.get('skills') or {}).items():
              if not cfg.get('enabled'):
                  continue
              cron = cfg.get('schedule')
              if not cron or cron in ('workflow_dispatch', 'chain-only'):
                  continue
              try:
                  itr = croniter(cron, now)
                  prev = itr.get_prev(datetime)
                  # If the previous match was within the last 5 minutes, fire it.
                  delta = (now - prev).total_seconds()
                  if 0 <= delta < 300:
                      matches.append(name)
              except Exception as e:
                  print(f"skip {name}: bad cron {cron}: {e}", file=sys.stderr)

          skills_csv = ",".join(matches)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"skills={skills_csv}\n")
          if matches:
              print(f"Dispatching {len(matches)} skill(s): {skills_csv}")
          else:
              print("No skill claimed this slot")
          EOF
        env:
          PYTHONUNBUFFERED: 1

      - name: Dispatch matching skills
        if: steps.pick.outputs.skills != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IFS=',' read -ra SKILLS <<< "${{ steps.pick.outputs.skills }}"
          for skill in "${SKILLS[@]}"; do
            echo "Dispatching: $skill"
            gh workflow run aeon.yml \
              -f skill="$skill" \
              -f var=""
          done
